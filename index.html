<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEase – Modern E-Commerce</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">ShopEase</div>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="checkout.html">Checkout</a>
    </div>
    <button class="cart-btn" onclick="toggleCart()">
      🛒 Cart <span class="cart-count" id="cart-count">0</span>
    </button>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Discover Products <br/>You'll Love</h1>
      <p>Quality items, fast delivery, easy returns.</p>
      <a href="#products" class="btn-primary">Shop Now</a>
    </div>
  </section>

  <!-- FILTER BAR -->
  <section class="filter-bar" id="products">
    <input type="text" id="search-input" placeholder="Search products..." oninput="filterProducts()" />
    <select id="category-filter" onchange="filterProducts()">
      <option value="all">All Categories</option>
      <option value="electronics">Electronics</option>
      <option value="clothing">Clothing</option>
      <option value="books">Books</option>
      <option value="home">Home & Living</option>
    </select>
    <select id="sort-filter" onchange="filterProducts()">
      <option value="default">Sort By</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
    </select>
  </section>

  <!-- PRODUCT GRID -->
  <section class="products-section">
    <div class="product-grid" id="product-grid"></div>
  </section>

  <!-- CART SIDEBAR -->
  <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
  <div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button onclick="toggleCart()" class="close-btn">✕</button>
    </div>
    <div class="cart-items" id="cart-items">
      <p class="empty-cart">Your cart is empty.</p>
    </div>
    <div class="cart-footer">
      <div class="cart-total">Total: <span id="cart-total">₹0</span></div>
      <a href="checkout.html" class="btn-primary full-width">Proceed to Checkout</a>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast"></div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2025 ShopEase. Built with HTML, CSS & JavaScript.</p>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
